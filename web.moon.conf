server {
  listen 80;
  server_name moon.vast8.cn www.moon.vast8.cn;
  return 301 https://moon.vast8.cn$request_uri;
}

server {
  listen [::]:443 ssl http2;
  listen 443 ssl http2;

  server_name moon.vast8.cn www.moon.vast8.cn;

  include custom_settings/tls/ssl_engine.conf;
  include custom_settings/tls/policy_balanced.conf;

   ssl_certificate     /root/.acme.sh/*.vast8.cn_ecc/fullchain.cer;
  ssl_certificate_key /root/.acme.sh/*.vast8.cn_ecc/*.vast8.cn.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /data/moon/frontend/web/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    location /css/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(woff2?|ttf|otf)$ {
        expires 180d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
